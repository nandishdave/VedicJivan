name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches: [main, staging]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
            echo "api_url=https://api.vedicjivan.nandishdave.world" >> "$GITHUB_OUTPUT"
          else
            echo "env=test" >> "$GITHUB_OUTPUT"
            echo "api_url=https://api.vedicjivan-test.nandishdave.world" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_YOUTUBE_API_KEY: ${{ secrets.NEXT_PUBLIC_YOUTUBE_API_KEY }}
          NEXT_PUBLIC_YOUTUBE_CHANNEL_ID: ${{ secrets.NEXT_PUBLIC_YOUTUBE_CHANNEL_ID }}
          NEXT_PUBLIC_GOOGLE_PLACES_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_PLACES_API_KEY }}
          NEXT_PUBLIC_API_URL: ${{ steps.env.outputs.api_url }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ steps.env.outputs.env == 'prod' && secrets.AWS_ACCESS_KEY_ID || secrets.TEST_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ steps.env.outputs.env == 'prod' && secrets.AWS_SECRET_ACCESS_KEY || secrets.TEST_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          BUCKET=${{ steps.env.outputs.env == 'prod' && secrets.S3_BUCKET_NAME || secrets.TEST_S3_BUCKET_NAME }}
          aws s3 sync ./out s3://$BUCKET --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=${{ steps.env.outputs.env == 'prod' && secrets.CLOUDFRONT_DISTRIBUTION_ID || secrets.TEST_CLOUDFRONT_DISTRIBUTION_ID }}
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
