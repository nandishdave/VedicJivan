name: Deploy API to ECS Fargate

on:
  push:
    branches: [main, staging]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "env=test" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ steps.env.outputs.env == 'prod' && secrets.AWS_ACCESS_KEY_ID || secrets.TEST_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ steps.env.outputs.env == 'prod' && secrets.AWS_SECRET_ACCESS_KEY || secrets.TEST_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: ecr-login
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            docker login --username AWS --password-stdin "$REGISTRY"
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        env:
          ECR_REPO: ${{ steps.env.outputs.env == 'prod' && secrets.ECR_REPOSITORY || secrets.TEST_ECR_REPOSITORY }}
        with:
          context: ./api
          file: ./api/Dockerfile.prod
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:latest

      - name: Force new ECS deployment
        run: |
          if [[ "${{ steps.env.outputs.env }}" == "prod" ]]; then
            ECS_CLUSTER="${{ secrets.ECS_CLUSTER }}"
            ECS_SERVICE="${{ secrets.ECS_SERVICE }}"
          else
            ECS_CLUSTER="${{ secrets.TEST_ECS_CLUSTER }}"
            ECS_SERVICE="${{ secrets.TEST_ECS_SERVICE }}"
          fi
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment
